<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Eco Cat</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<!-- анти-кэш -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>
body {
  margin:0;
  font-family:sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:#e8f5e9;
}

.game {
  width:95%;
  max-width:420px;
}

/* КОМНАТА */
.world {
  height:260px;
  border-radius:15px;
  position:relative;
  overflow:hidden;

  display:flex;
  justify-content:center;
  align-items:flex-end;

  background-image: url("https://img.freepik.com/premium-vector/living-room-with-fireplace-background-banner-cartoon-design-cosy-home-interior-with-sofa-armchair-cushions-coffee-table-warm-fire-wooden-ladder-big-window-vector-cartoon-illustration_9209-16323.jpg");
  background-size: cover;
  background-position: center bottom;
}

/* КОТ */
#cat {
  position: absolute;

  /* положение */
  left: 22%;
  bottom: 6%;

  /* адаптивный размер */
  width: clamp(60px, 18vw, 90px);

  z-index: 2;

  transform-origin: bottom center;
  animation: chill 3s ease-in-out infinite;
}

@keyframes chill {
  0%   { transform: translateY(0) rotate(0deg); }
  25%  { transform: translateY(-3px) rotate(-1deg); }
  50%  { transform: translateY(0) rotate(1deg); }
  75%  { transform: translateY(-2px) rotate(-1deg); }
  100% { transform: translateY(0) rotate(0deg); }
}

.sad {
  filter: grayscale(1);
  transform: translateX(-50%) scale(0.9);
}

/* полоски */
.bar {
  height:8px;
  background:#ddd;
  margin:5px 0;
  border-radius:5px;
}

.fill {
  height:100%;
  border-radius:5px;
}

/* кнопки */
button {
  margin:5px;
  padding:10px;
  border:none;
  border-radius:12px;
  background:#ff9800;
  color:white;
  font-size:16px;
}
</style>
</head>

<body>

<div class="game">

<h3>🐱 Eco Cat</h3>
<p id="playerName"></p>

<p>💰: <span id="coins">0</span></p>
<p>Уровень: <span id="level">1</span></p>

<div class="bar"><div id="xpBar" class="fill"></div></div> 

<div class="world">
  <div class="cat-shadow"></div>
  <img id="cat" src="https://res.cloudinary.com/dqrzftgbw/image/upload/v1777096417/martyni_sdr09g.png">
</div>

❤️ <div class="bar"><div id="hpBar" class="fill"></div></div>
🍗 <div class="bar"><div id="hungerBar" class="fill"></div></div>
😊 <div class="bar"><div id="moodBar" class="fill"></div></div>
🌿 <div class="bar"><div id="ecoBar" class="fill"></div></div>

<button onclick="feed()">🍗</button>
<button onclick="pet()">❤️</button>
<button onclick="clean()">🧹</button>

</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

let username = "Игрок";
if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
  username = tg.initDataUnsafe.user.first_name;
}

let data = {
  hp:100,
  hunger:100,
  mood:100,
  eco:50,
  level:1,
  xp:0,
  xpToNext:50,
  coins:0
};

function save(){
  localStorage.setItem("ecoSave", JSON.stringify(data));
}

function load(){
  let s = localStorage.getItem("ecoSave");
  if(s) data = JSON.parse(s);
}

function addXP(a){
  data.xp+=a;
  if(data.xp>=data.xpToNext){
    data.xp-=data.xpToNext;
    data.level++;
    data.xpToNext=Math.floor(data.xpToNext*1.4);
    data.coins+=20;
  }
}

function feed(){
  data.hunger+=15;
  data.mood+=5;
  addXP(5);
}

function pet(){
  data.mood+=10;
  addXP(3);
}

function clean(){
  data.eco+=15;
  data.mood-=5;
  addXP(7);
}

function setBar(id,val,color){
  let el=document.getElementById(id);
  el.style.width=val+"%";
  el.style.background=color;
}

function updateUI(){
  document.getElementById("playerName").innerText = "Привет, " + username;

  setBar("hpBar",data.hp,"red");
  setBar("hungerBar",data.hunger,"orange");
  setBar("moodBar",data.mood,"green");
  setBar("ecoBar",data.eco,"blue");
  setBar("xpBar",(data.xp/data.xpToNext)*100,"purple");

  document.getElementById("level").innerText=data.level;
  document.getElementById("coins").innerText=data.coins;

  let cat=document.getElementById("cat");

  if(data.hunger<30 || data.mood<30){
    cat.classList.add("sad");
  } else {
    cat.classList.remove("sad");
  }
}

function tick(){
  data.hunger-=0.5;
  data.mood-=0.3;

  if(data.hunger<=0) data.hp-=0.5;

  data.hp=Math.max(0,Math.min(100,data.hp));
  data.hunger=Math.max(0,Math.min(100,data.hunger));
  data.mood=Math.max(0,Math.min(100,data.mood));
  data.eco=Math.max(0,Math.min(100,data.eco));

  updateUI();
  save();
}

load();
updateUI();
setInterval(tick,1000);
</script>

</body>
</html>
